baseURL: "https://adityaparab.com"
locale: "en-us"
title: "Aditya Parab"
theme: hugo-profile

defaultContentLanguage: "en"

languages:
  en:
    label: "English"
    weight: 1
    contentDir: "content"
    menu:
      main:
        - identifier: blog
          name: Blog
          title: Blog posts
          url: /blogs
          weight: 1

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  title: "Aditya Parab"
  description: "Software QA Engineer | adityaparab.com"
  favicon: "/images/favicon.ico"

  useBootstrapCDN: false
  animate: true

  theme:
    disableThemeToggle: false
    defaultTheme: "light"

  navbar:
    align: ms-auto
    brandName: "Aditya Parab"
    disableSearch: false
    stickyNavBar:
      enable: true
      showOnScrollUp: true

  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Aditya Parab."
    subtitle: "I make sure software actually works."
    content: "A detail-obsessed Software QA Engineer with a passion for finding bugs before users do. I build test strategies, automate quality checks, and help teams ship with confidence."
    image: /images/profile.jpg
    bottomImage:
      enable: true
    button:
      enable: true
      name: "Resume"
      url: "/resume.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-linkedin
          url: https://linkedin.com/in/adityaparab
        - icon: fab fa-github
          url: https://github.com/adiparab14

  about:
    enable: true
    title: "About Me"
    image: "/images/profile.jpg"
    content: |-
      I'm a Software QA Engineer with experience building quality assurance processes from the ground up. I specialize in manual and automated testing, test planning, and working closely with development teams to ship reliable software.

      I'm currently based in [your city] and open to new opportunities.
    skills:
      enable: true
      title: "Technologies & tools I work with:"
      items:
        - "Selenium / Appium"
        - "Postman / REST API Testing"
        - "JIRA / TestRail"
        - "Python / Java"
        - "CI/CD (Jenkins, GitHub Actions)"
        - "Android / iOS testing"
        - "SQL"
        - "Git"

  experience:
    enable: true
    items:
      - job: "Software QA Engineer"
        company: "Your Company"
        companyUrl: "https://example.com"
        date: "Jan 2022 - present"
        featuredLink:
          enable: false
        content: |
          - Led end-to-end test planning and execution for mobile and web applications
          - Built and maintained automated regression test suites using Selenium
          - Reduced bug escape rate by X% through improved test coverage
          - Collaborated with dev and product teams in an Agile environment

      - job: "QA Analyst"
        company: "Previous Company"
        companyUrl: "https://example.com"
        date: "Jun 2019 - Dec 2021"
        featuredLink:
          enable: false
        content: |
          - Performed manual functional, regression, and exploratory testing
          - Wrote detailed bug reports and worked with developers on root cause analysis
          - Created and maintained test cases in TestRail

  education:
    enable: true
    items:
      - title: "Your Degree"
        school:
          name: "Your University"
          url: "https://example.com"
        date: "2015 - 2019"
        content: "Add your field of study and any relevant coursework or achievements here."

  achievements:
    enable: false

  projects:
    enable: false

  contact:
    enable: true
    title: "Get in touch"
    content: "Whether it's a job opportunity, a collaboration, or just a question — my inbox is open."
    btnName: "Email me"
    btnLink: "mailto:adiparab14@gmail.com"

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: "Recent Posts"
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      linkedin: https://linkedin.com/in/adityaparab
      github: https://github.com/adiparab14
